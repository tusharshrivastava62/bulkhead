worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream proxies {
        least_conn;
        server proxy1:8000 max_fails=3 fail_timeout=5s;
        server proxy2:8000 max_fails=3 fail_timeout=5s;
        server proxy3:8000 max_fails=3 fail_timeout=5s;
    }

    # add a simple passthrough, proxy handles the rest
    server {
        listen 80;

        location / {
            proxy_pass http://proxies;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}

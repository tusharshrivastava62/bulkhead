version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - BACKEND_LATENCY_MS=50
      - BACKEND_JITTER_MS=20
      - BACKEND_DEGRADED=false
    ports:
      - "9000:9000"

  proxy1:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    environment:
      - BACKEND_URL=http://backend:9000
      - REPLICA_ID=proxy1
    depends_on:
      - backend

  proxy2:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    environment:
      - BACKEND_URL=http://backend:9000
      - REPLICA_ID=proxy2
    depends_on:
      - backend

  proxy3:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    environment:
      - BACKEND_URL=http://backend:9000
      - REPLICA_ID=proxy3
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - proxy1
      - proxy2
      - proxy3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
